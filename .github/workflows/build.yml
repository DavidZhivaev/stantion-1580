name: Build Executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Build executable
        run: |
          pyinstaller --name "ScanStation" ^
            --onedir ^
            --windowed ^
            --icon=scan.ico ^
            --add-data "config.json;." ^
            --add-data "digit_model.pth;." ^
            --add-data "Overpass-Regular.ttf;." ^
            --add-data "Spectral-Bold.ttf;." ^
            --add-data "Spectral-Medium.ttf;." ^
            --add-data "scan.ico;." ^
            --hidden-import=PIL ^
            --hidden-import=PIL.Image ^
            --hidden-import=cv2 ^
            --hidden-import=numpy ^
            --hidden-import=pyzbar ^
            --hidden-import=pyzbar.pyzbar ^
            --hidden-import=torch ^
            --hidden-import=win32com.client ^
            --hidden-import=pythoncom ^
            --collect-all pyzbar ^
            main.py
        shell: cmd

      - name: Copy driver to dist
        run: |
          if (Test-Path "bin") {
            Copy-Item -Path "bin" -Destination "dist/ScanStation/bin" -Recurse
          }
        shell: pwsh

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist/ScanStation/*" -DestinationPath "ScanStation-windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanStation-windows
          path: ScanStation-windows.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0 python3-tk libsane-dev sane-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-linux.txt
          pip install pyinstaller
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Build executable
        run: |
          pyinstaller --name "ScanStation" \
            --onedir \
            --add-data "config.json:." \
            --add-data "digit_model.pth:." \
            --add-data "Overpass-Regular.ttf:." \
            --add-data "Spectral-Bold.ttf:." \
            --add-data "Spectral-Medium.ttf:." \
            --add-data "scan.ico:." \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=cv2 \
            --hidden-import=numpy \
            --hidden-import=pyzbar \
            --hidden-import=pyzbar.pyzbar \
            --hidden-import=torch \
            --hidden-import=sane \
            --collect-all pyzbar \
            --collect-all sane \
            main.py

      - name: Create tarball
        run: |
          tar -czvf ScanStation-linux.tar.gz -C dist ScanStation

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanStation-linux
          path: ScanStation-linux.tar.gz
          retention-days: 30

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScanStation-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ScanStation-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ScanStation-windows.zip
            ScanStation-linux.tar.gz
          generate_release_notes: true
